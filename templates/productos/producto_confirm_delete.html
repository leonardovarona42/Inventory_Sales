{% extends 'base.html' %}

{% block title %}Eliminar Insumo{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2>Eliminar insumo</h2>
    <p>Confirma eliminar <strong>{{ object.nombre }}</strong>.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'producto_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
