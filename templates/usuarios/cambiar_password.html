{% extends 'base.html' %}

{% block title %}Cambiar Contraseña{% endblock %}
{% block page_title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-primary-100 dark:bg-primary-900/30 rounded-lg flex items-center justify-center">
                <i class="fas fa-key text-primary-600 dark:text-primary-400"></i>
            </div>
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Cambiar Contraseña</h2>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Contraseña Actual</label>
                <input type="password" name="{{ form.password_actual.html_name }}" id="{{ form.password_actual.id_for_label }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition dark:border-gray-600 dark:bg-gray-700 dark:text-white" placeholder="Contraseña Actual">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Nueva Contraseña</label>
                <input type="password" name="{{ form.password_nuevo.html_name }}" id="{{ form.password_nuevo.id_for_label }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition dark:border-gray-600 dark:bg-gray-700 dark:text-white" placeholder="Nueva Contraseña">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Confirmar Contraseña</label>
                <input type="password" name="{{ form.password_confirmar.html_name }}" id="{{ form.password_confirmar.id_for_label }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition dark:border-gray-600 dark:bg-gray-700 dark:text-white" placeholder="Confirmar Contraseña">
            </div>
            {% if form.non_field_errors %}
                <p class="text-red-600 dark:text-red-400 text-sm">{{ form.non_field_errors }}</p>
            {% endif %}
            <div class="flex gap-3 pt-4 border-t border-gray-100 dark:border-gray-700">
                <a href="{% url 'mi_perfil' %}" class="flex-1 py-2.5 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-center">Cancelar</a>
                <button type="submit" class="flex-1 py-2.5 bg-primary-600 text-white rounded-lg hover:bg-primary-700 dark:hover:bg-primary-500">
                    <i class="fas fa-save mr-2"></i> Cambiar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
